name: NodeJS App Pipeline

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  node-release-prepare-version:
    uses: Rule-1-Repository/trucker-cloud-cicd/.github/workflows/node-prepare-version.yaml@main
    with:
      NODE_VERSION: 22.22.0    

  determine_release:
    needs: node-release-prepare-version
    uses: Rule-1-Repository/trucker-cloud-cicd/.github/workflows/determine-release.yaml@main

  select-env-vars:
    needs: [determine_release]
    runs-on: ubuntu-latest
    steps:
      - name: Map environment
        id: map_variables
        uses: kanga333/variable-mapper@master
        with:
          key: ${{ needs.determine_release.outputs.app_environment }}
          map: |
            {
              "dev": {
                "certificate_arn": "arn:aws:acm:us-east-2:082655277789:certificate/ce967966-e3a4-4e01-8299-4609cae1a928"
               
              }
              
            }
          export_to: 'env,output'
    outputs:
      certificate_arn: ${{ steps.map_variables.outputs.certificate_arn }}
      backend_url: ${{ steps.map_variables.outputs.backend_url }}

  node-build:
    uses: Rule-1-Repository/trucker-cloud-cicd/.github/workflows/node-build.yaml@main
    needs: [select-env-vars]
    with:
      NODE_VERSION: 22.22.0
      REGION: us-east-2
      ACCOUNT: ${{ vars.TRUCKERCLOUD_AWS_ACCOUNT_ID }}
      RUN_TESTS: false
      BUILD_VARIABLES: CI="" 
      ENVIRONMENT: dev
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.TRUCKERCLOUD_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.TRUCKERCLOUD_ACCESS_KEY }}

  docker-build:
    uses: Rule-1-Repository/trucker-cloud-cicd/.github/workflows/docker-build.yaml@main
    if: ${{ github.ref == 'refs/heads/develop' }}
    needs: [node-build, determine_release]
    with:
      DOCKER_REGISTRY: tc-website-temp-repository-${{ needs.determine_release.outputs.release_type }}
      REGION: us-east-2
      ACCOUNT: ${{ vars.TRUCKERCLOUD_AWS_ACCOUNT_ID }}
      NODE_VERSION: 18.12.0
      STACK: nodejs
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.TRUCKERCLOUD_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.TRUCKERCLOUD_ACCESS_KEY }}

  eks-deploy:
    uses: Rule-1-Repository/trucker-cloud-cicd/.github/workflows/eks-deploy.yaml@main
    if: ${{  github.ref == 'refs/heads/develop' }}
    needs: [docker-build, select-env-vars, determine_release]
    with:
      CLUSTER_NAME: truckercloud-eks-uat
      SERVICE_NAME: tc-website
      REGION: us-east-2
      ACCOUNT: ${{ vars.TRUCKERCLOUD_AWS_ACCOUNT_ID }}
      VARIABLES: IMAGE=${{ needs.determine_release.outputs.release_type }},CERTIFICATE_ARN=${{ needs.select-env-vars.outputs.certificate_arn }}
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.TRUCKERCLOUD_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.TRUCKERCLOUD_ACCESS_KEY }}

 
