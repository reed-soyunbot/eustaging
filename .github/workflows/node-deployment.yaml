name: NodeJS App Pipeline

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  load-config:
    runs-on: ubuntu-latest
    outputs:
      aws_account_id: ${{ steps.cfg.outputs.aws_account_id }}
      acm_cert_arn: ${{ steps.cfg.outputs.acm_cert_arn }}
      region: ${{ steps.cfg.outputs.region }}
      cluster: ${{ steps.cfg.outputs.cluster }}
      namespace: ${{ steps.cfg.outputs.namespace }}
      service: ${{ steps.cfg.outputs.service }}
      ecr_repo_prefix: ${{ steps.cfg.outputs.ecr_repo_prefix }}
      container_port: ${{ steps.cfg.outputs.container_port }}
      node_version: ${{ steps.cfg.outputs.node_version }}
      docker_node_version: ${{ steps.cfg.outputs.docker_node_version }}
    steps:
      - uses: actions/checkout@v4
      - id: cfg
        shell: bash
        run: |
          for key in aws_account_id acm_cert_arn region cluster namespace service ecr_repo_prefix container_port node_version docker_node_version; do
            val=$(yq -r ".$key" deploy.config.yaml)
            echo "$key=$val" >> "$GITHUB_OUTPUT"
          done

  node-release-prepare-version:
    needs: [load-config]
    uses: Rule-1-Repository/trucker-cloud-cicd/.github/workflows/node-prepare-version.yaml@main
    with:
      NODE_VERSION: ${{ needs.load-config.outputs.node_version }}

  determine_release:
    needs: node-release-prepare-version
    uses: Rule-1-Repository/trucker-cloud-cicd/.github/workflows/determine-release.yaml@main

  node-build:
    uses: Rule-1-Repository/trucker-cloud-cicd/.github/workflows/node-build.yaml@main
    needs: [load-config, determine_release]
    with:
      NODE_VERSION: ${{ needs.load-config.outputs.node_version }}
      REGION: ${{ needs.load-config.outputs.region }}
      ACCOUNT: ${{ needs.load-config.outputs.aws_account_id }}
      RUN_TESTS: false
      BUILD_VARIABLES: CI=""
      ENVIRONMENT: dev
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.MARKETING_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.MARKETING_ACCESS_KEY }}

  docker-build:
    uses: Rule-1-Repository/trucker-cloud-cicd/.github/workflows/docker-build.yaml@main
    if: ${{ github.ref == 'refs/heads/develop' }}
    needs: [load-config, node-build, determine_release]
    with:
      DOCKER_REGISTRY: ${{ needs.load-config.outputs.ecr_repo_prefix }}-${{ needs.determine_release.outputs.release_type }}
      REGION: ${{ needs.load-config.outputs.region }}
      ACCOUNT: ${{ needs.load-config.outputs.aws_account_id }}
      NODE_VERSION: ${{ needs.load-config.outputs.docker_node_version }}
      STACK: nodejs
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.MARKETING_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.MARKETING_ACCESS_KEY }}

  eks-deploy:
    uses: Rule-1-Repository/trucker-cloud-cicd/.github/workflows/eks-deploy.yaml@main
    if: ${{ github.ref == 'refs/heads/develop' }}
    needs: [load-config, docker-build, determine_release]
    with:
      CLUSTER_NAME: ${{ needs.load-config.outputs.cluster }}
      SERVICE_NAME: ${{ needs.load-config.outputs.service }}
      REGION: ${{ needs.load-config.outputs.region }}
      ACCOUNT: ${{ needs.load-config.outputs.aws_account_id }}
      NAMESPACE: 'marketing'
      VARIABLES: IMAGE=${{ needs.determine_release.outputs.release_type }},CERTIFICATE_ARN=${{ needs.load-config.outputs.acm_cert_arn }},ACCOUNT_ID=${{ needs.load-config.outputs.aws_account_id }},REGION=${{ needs.load-config.outputs.region }},ECR_REPO_PREFIX=${{ needs.load-config.outputs.ecr_repo_prefix }},SERVICE_NAME=${{ needs.load-config.outputs.service }},NAMESPACE=${{ needs.load-config.outputs.namespace }},CONTAINER_PORT=${{ needs.load-config.outputs.container_port }}
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.MARKETING_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.MARKETING_ACCESS_KEY }}
